<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subsonic — Crear Espacio</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-page="providerCreateSpace">

<header>
  <div class="nav">
    <a class="brand" href="../index.html">
      <img src="../fotos_principales/logo.jpg" alt="Subsonic Logo" class="brand-logo" /><span>Subsonic</span>
    </a>
    <nav class="navlinks" id="navlinks"></nav>
  </div>
</header>

<main class="container">
  <div class="card">
    <h1 class="h-title" style="margin:0">Crear Nuevo Espacio</h1>
    <p class="small">Registra un nuevo espacio para alquiler.</p>

    <form id="createSpaceForm">
      <div class="field">
        <label for="eventId">Evento</label>
        <select id="eventId" required>
          <option value="">Selecciona un evento</option>
        </select>
      </div>

      <div class="field">
        <label for="type">Tipo de Espacio</label>
        <select id="type" required>
          <option value="Food Truck">Food Truck</option>
          <option value="Merch Stand">Merch Stand</option>
          <option value="Bebidas">Bebidas</option>
        </select>
      </div>

      <div class="field">
        <label for="size">Tamaño</label>
        <input id="size" type="text" required placeholder="Ej: 10x5 metros" />
      </div>

      <div class="field">
        <label for="location">Ubicación</label>
        <input id="location" type="text" required placeholder="Ej: Zona principal" />
      </div>

      <div class="field">
        <label for="pricePerDay">Precio por Día (€)</label>
        <input id="pricePerDay" type="number" step="0.01" required placeholder="0.00" />
      </div>

      <div class="field">
        <label for="services">Servicios Incluidos</label>
        <textarea id="services" placeholder="Ej: Electricidad, agua, etc."></textarea>
      </div>

      <div class="field">
        <label for="notes">Notas Adicionales</label>
        <textarea id="notes" placeholder="Información adicional"></textarea>
      </div>

      <div class="right" style="margin-top: 1rem;">
        <button class="btn" type="submit">Crear Espacio</button>
        <a href="provider-manage-spaces.html" class="btn secondary">Cancelar</a>
      </div>
    </form>

    <div id="message" style="margin-top: 1rem;"></div>
  </div>
</main>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script type="module" src="../js/provider-create-space-loader.js"></script>
</body>
</html>
