<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subsonic — Gestionar Espacios</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-page="providerManageSpaces">

<header>
  <div class="nav">
    <a class="brand" href="../index.html">
      <img src="../fotos_principales/logo.jpg" alt="Subsonic Logo" class="brand-logo" /><span>Subsonic</span>
    </a>
    <nav class="navlinks" id="navlinks"></nav>
  </div>
</header>

<main class="container">
  <div class="card">

    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Evento</th>
          <th>Tipo</th>
          <th>Ubicación</th>
          <th>Precio/Día</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="spacesTableBody"></tbody>
    </table>

<script src="../js/data.js"></script>
