<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subsonic — Registro</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-page="register">

<header>
  <div class="nav">
    <a class="brand" href="../index.html">
      <img src="../fotos_principales/logo.jpg" alt="Subsonic Logo" class="brand-logo" /><span>Subsonic</span>
    </a>
    <nav class="navlinks" id="navlinks"></nav>
  </div>
</header>

<main class="container center">
  <section class="card" style="max-width:720px;width:100%">
    <h1 class="h-title">Crear cuenta</h1>
    <p class="small">Crea tu cuenta para acceder a todos los servicios de Subsonic.</p>

    <form id="registerForm">
      <div class="grid grid-2">
        <div class="field">
          <label>Nombre</label>
          <input id="regName" required placeholder="Nombre Apellidos" />
        </div>
        <div class="field">
          <label>Email</label>
          <input id="regEmail" required type="email" placeholder="email@gmail.com" />
        </div>
      </div>

      <div class="field">
        <label>Tipo de cuenta</label>
        <div class="row" style="gap:15px; margin-top:8px">
          <label style="display:flex; align-items:center; gap:5px; cursor:pointer">
            <input type="radio" name="regRole" value="client" checked /> Cliente
          </label>
          <label style="display:flex; align-items:center; gap:5px; cursor:pointer">
            <input type="radio" name="regRole" value="provider" /> Proveedor
          </label>
        </div>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input id="regPassword" required type="password" placeholder="••••••••" />
      </div>

      <div style="text-align:center;margin:12px 0">
        <button id="googleSignUp" class="btn secondary" type="button" style="width:100%">
          Registrarse con Google
        </button>
      </div>

      <div class="right">
        <button class="btn" type="submit">Registrarse</button>
        <a class="btn secondary" href="login.html">Volver</a>
      </div>
    </form>
  </section>
</main>

<!-- Firebase JS SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="../js/firebase-init.js"></script>

<script src="../js/data.js"></script>
<script src="../js/app.js?v=nav-fix-8"></script>
