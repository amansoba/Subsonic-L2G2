          <a href="festivals/valencia.html">Valencia</a>
          <a href="festivals/madrid.html">Madrid</a>
          <a href="festivals/asia.html">Asia</a>
          <a href="festivals/brasil.html">Brasil</a>
          <a href="festivals/winter.html">Winter</a>

      <div class="dropdown">

      </div>
      <div class="dropdown">

<main class="heroTL" role="main">

  <div class="heroTL-overlay">

      <div class="heroTL-kicker">UNA EXPERIENCIA UNICA</div>

      <p class="heroTL-sub">
        Donde la música, la energía y la imaginación se encuentran. Bienvenido a una nueva dimensión del festival.
      </p>

    <div class="events-carousel-container">
      <button id="prev-event" class="carousel-btn prev" aria-label="Previous event">‹</button>
      <div class="events-carousel-viewport">

        </section>
      </div>
      <button id="next-event" class="carousel-btn next" aria-label="Next event">›</button>
    </div>
  </div>

<script>
  // Toggle hamburger menu
  const hamburger = document.querySelector('.hamburger');
  const menu = document.querySelector('.topbar-menu');
  if (hamburger && menu) {
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      menu.classList.toggle('open');
    });
  }
</script>
