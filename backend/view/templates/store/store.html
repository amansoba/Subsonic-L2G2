<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subsonic — Store</title>
  <link rel="stylesheet" href="../css/styles.css?v=colors-1" />
</head>
<body data-page="store-new">

<header>
  <div class="nav">
    <a class="brand" href="../index.html"><img src="../fotos_principales/logo.jpg" alt="Subsonic Logo" class="brand-logo" /><span>Subsonic</span></a>
    <nav class="navlinks" id="navlinks"></nav>

    </div>

    <span class="badge" style="cursor:pointer" data-cat="Nuevo">Nuevo</span>

<!-- Load old scripts first to provide global functions -->
<script src="../js/data.js"></script>

</html>
