<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subsonic — Mi Perfil</title>
  <link rel="stylesheet" href="../css/styles.css?v=colors-1" />
</head>
<body data-page="profile">

<header>
  <div class="nav">
    <a class="brand" href="../index.html">
      <img src="../fotos_principales/logo.jpg" alt="Subsonic Logo" class="brand-logo" /><span>Subsonic</span>
    </a>
    <nav class="navlinks" id="navlinks"></nav>
  </div>
</header>

<main class="container" id="profileBox">
  <div class="card">
    <h1 class="h-title">Mi Perfil</h1>
    <p class="small">Gestiona tu información personal y tus preferencias.</p>
    <div class="hr"></div>
    
    <form id="profileForm">
      <div class="grid grid-2">
        <div class="field">
          <label for="name">Nombre</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="field">
          <label for="username">Nombre de usuario</label>
          <input type="text" id="username" name="username" readonly />
          <p class="small">El nombre de usuario no se puede cambiar.</p>
        </div>
         <div class="field">
          <label for="joinDate">Miembro desde</label>
          <input type="text" id="joinDate" name="joinDate" readonly />
        </div>
      </div>
      <div class="right" style="margin-top: 16px;">
        <button type="submit" class="btn">Guardar Cambios</button>
      </div>
    </form>
  </div>
  
  <div class="card" style="margin-top: 24px;">
      <h2 class="h-title">Seguridad</h2>
      <a href="change-password.html" class="btn secondary">Cambiar Contraseña</a>
  </div>

</main>

<!-- Firebase JS SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="../js/firebase-init.js"></script>

<script src="../js/data.js"></script>
<script src="../js/app.js?v=nav-fix-8"></script>
<script type="module" src="../js/profile-loader.js?v=profile-fix-2"></script>
</body>
</html>
