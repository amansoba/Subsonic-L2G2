<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subsonic — Admin: Editar Usuario</title>
  <link rel="stylesheet" href="../css/styles.css?v=typography-1" />
</head>
<body data-page="adminEditUser">

<header>
  <div class="nav">
    <a class="brand" href="../index.html">
        <img src="../fotos_principales/logo.jpg" alt="Subsonic Logo" class="brand-logo" />
        <span>Subsonic</span>
    </a>
    <nav class="navlinks" id="navlinks"></nav>
  </div>
</header>

<main class="container">
  <div id="form-container">
    <h1 class="h-title">Editar Usuario</h1>
    <form id="edit-user-form" class="card">
        <input type="hidden" name="id" />
        
        <label>Nombre</label>
        <input name="name" required />

        <label>Email</label>
        <input name="email" type="email" required />
        
        <label>Rol</label>
        <select name="role">
            <option value="client">Cliente</option>
            <option value="provider">Proveedor</option>
            <option value="admin">Admin</option>
        </select>

        <div style="margin-top:8px">
            <button class="btn" type="submit">Guardar Cambios</button>
            <a href="manage-users.html" class="btn btn-secondary">Volver a la lista</a>
        </div>
    </form>
  </div>
</main>

<script src="../js/data.js"></script>
<script src="../js/app.js?v=nav-fix-8"></script>
<script src="../js/apiService.js" type="module"></script>
<script src="../js/admin-edit-user-loader.js" type="module"></script>

</body>
</html>
