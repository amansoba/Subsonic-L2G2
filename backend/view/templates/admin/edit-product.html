<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subsonic — Admin: Editar Producto</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-page="adminEditProduct">

<header>
  <div class="nav">
    <a class="brand" href="../index.html">
        <img src="../fotos_principales/logo.jpg" alt="Subsonic Logo" class="brand-logo" />
        <span>Subsonic</span>
    </a>
    <nav class="navlinks" id="navlinks"></nav>
  </div>
</header>

<main class="container">
  <div id="form-container">
    <h1 class="h-title">Editar Producto</h1>
    <form id="edit-product-form" class="card">
        <input type="hidden" name="id" />
        
        <label>Nombre del Producto</label>
        <input name="name" required />

        <label>Precio</label>
        <input name="price" type="number" step="0.01" required />

        <label>Categoría</label>
        <input name="category" />

        <label>Género</label>
        <select name="gender">
            <option value="Unisex">Unisex</option>
            <option value="Hombre">Hombre</option>
            <option value="Mujer">Mujer</option>
        </select>
        
        <label>Tallas (separadas por comas)</label>
        <input name="sizes" />

        <label>Descripción</label>
        <textarea name="desc" rows="4"></textarea>

        <label>Imágenes (URLs, separadas por comas)</label>
        <input name="images" />

        <div style="margin-top:8px">
            <button class="btn" type="submit">Guardar Cambios</button>
            <a href="manage-products.html" class="btn btn-secondary">Volver a la lista</a>
        </div>
    </form>
  </div>
</main>

<script src="../js/data.js"></script>
<script src="../js/app.js?v=nav-fix-8"></script>
<script src="../js/apiService.js" type="module"></script>
<script src="../js/admin-edit-product-loader.js" type="module"></script>

</body>
</html>
