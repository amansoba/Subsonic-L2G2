<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subsonic — Admin: Editar Espacio</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-page="adminEditSpace">

<header>
  <div class="nav">
    <a class="brand" href="../index.html">
        <img src="../fotos_principales/logo.jpg" alt="Subsonic Logo" class="brand-logo" />
        <span>Subsonic</span>
    </a>
    <nav class="navlinks" id="navlinks"></nav>
  </div>
</header>

<main class="container">
  <div id="form-container">
    <h1 class="h-title">Editar Espacio</h1>
    <form id="edit-space-form" class="card">
        <input type="hidden" name="id" />
        
        <label>Evento ID</label>
        <input name="eventId" type="number" required />

        <label>Tipo de Espacio</label>
        <input name="type" required />

        <label>Tamaño (ej: 10x10m)</label>
        <input name="size" />

        <label>Ubicación</label>
        <input name="location" />

        <label>Precio por día</label>
        <input name="pricePerDay" type="number" step="0.01" required />
        
        <label>Estado</label>
        <select name="status">
            <option value="Disponible">Disponible</option>
            <option value="Reservado">Reservado</option>
            <option value="Mantenimiento">Mantenimiento</option>
        </select>

        <label>Servicios (separados por comas)</label>
        <input name="services" />

        <label>Notas</label>
        <textarea name="notes" rows="3"></textarea>

        <div style="margin-top:8px">
            <button class="btn" type="submit">Guardar Cambios</button>
            <a href="manage-spaces.html" class="btn btn-secondary">Volver a la lista</a>
        </div>
    </form>
  </div>
</main>

<script src="../js/data.js"></script>
<script src="../js/app.js?v=nav-fix-8"></script>
<script src="../js/apiService.js" type="module"></script>
<script src="../js/admin-edit-space-loader.js" type="module"></script>

</body>
</html>
